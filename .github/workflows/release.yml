name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build dirless-cli (static)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build static binary (Alpine/musl)
        run: |
          mkdir -p dist
          docker build -t dirless-cli-builder -f Dockerfile.build .
          docker run --rm \
            -v "${{ github.workspace }}/dist":/output \
            dirless-cli-builder \
            sh -c "cp /build/dirless-cli /output/dirless-cli && chmod +x /output/dirless-cli"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dirless-cli
          generate_release_notes: true
